<!DOCTYPE html>
<html lang="zh-TW" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>差假工時邏輯計算器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-slate-100 min-h-screen transition-colors duration-300">

    <div class="max-w-md mx-auto px-6 py-12">
        <!-- Header -->
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-2xl font-bold tracking-tight">差假計算器</h1>
                <p class="text-sm text-slate-500 dark:text-slate-400">符合系統 08:30-17:30 規範</p>
            </div>
            <button onclick="toggleDarkMode()" class="p-2 rounded-lg bg-slate-200 dark:bg-slate-800 hover:ring-2 ring-primary transition-all">
                <span id="theme-icon">🌙</span>
            </button>
        </div>

        <!-- Main Card -->
        <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-xl p-6 space-y-6 border border-slate-200 dark:border-slate-700">
            
            <!-- Input 1: Sign In Time -->
            <div class="space-y-2">
                <label class="block text-sm font-semibold">簽到時間</label>
                <input type="time" id="signIn" value="08:00" onchange="calculate()"
                    class="w-full bg-slate-50 dark:bg-slate-700 border-none rounded-xl p-3 focus:ring-2 focus:ring-primary outline-none">
            </div>

            <!-- Display Area -->
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-blue-50 dark:bg-blue-900/30 p-4 rounded-xl">
                    <p class="text-xs text-blue-600 dark:text-blue-400 font-bold uppercase">預計下班</p>
                    <p id="offWorkTime" class="text-xl font-bold">17:00</p>
                </div>
                <div class="bg-purple-50 dark:bg-purple-900/30 p-4 rounded-xl">
                    <p class="text-xs text-purple-600 dark:text-purple-400 font-bold uppercase">應出勤時數</p>
                    <p class="text-xl font-bold">8.0 小時</p>
                </div>
            </div>

            <hr class="border-slate-100 dark:border-slate-700">

            <!-- Input 2: Leave Duration -->
            <div class="space-y-2">
                <label class="block text-sm font-semibold">欲請假時數 (小時)</label>
                <select id="leaveHours" onchange="calculate()" 
                    class="w-full bg-slate-50 dark:bg-slate-700 border-none rounded-xl p-3 focus:ring-2 focus:ring-primary outline-none">
                    <option value="0">不請假</option>
                    <option value="0.5">0.5 小時</option>
                    <option value="1">1.0 小時</option>
                    <option value="1.5">1.5 小時</option>
                    <option value="2">2.0 小時</option>
                    <option value="4">4.0 小時</option>
                </select>
            </div>

            <!-- Logic Results -->
            <div id="resultBox" class="hidden space-y-4 pt-2">
                <div class="p-4 bg-amber-50 dark:bg-amber-900/20 border-l-4 border-amber-400 rounded-r-xl">
                    <h3 class="text-sm font-bold text-amber-700 dark:text-amber-400 mb-1">💡 系統假單建議填寫</h3>
                    <p id="suggestedLeave" class="text-lg font-mono font-bold text-amber-800 dark:text-amber-200">16:30 ~ 17:30</p>
                    <p class="text-[10px] mt-1 opacity-70">*已對齊系統限制範圍 (08:30-17:30)</p>
                </div>

                <div class="p-4 bg-green-50 dark:bg-green-900/20 border-l-4 border-green-400 rounded-r-xl">
                    <h3 class="text-sm font-bold text-green-700 dark:text-green-400 mb-1">🏁 最早簽退時間</h3>
                    <p id="earliestExit" class="text-2xl font-bold text-green-800 dark:text-green-200 underline decoration-green-400 decoration-4 underline-offset-4">16:00 即可離開</p>
                </div>
            </div>
        </div>

        <!-- Rules Footer -->
        <div class="mt-8 p-4 text-[11px] text-slate-400 dark:text-slate-500 leading-relaxed bg-slate-100 dark:bg-slate-800/50 rounded-xl">
            <p>● 午休時間固定為 12:30 ~ 13:30 (不計薪)</p>
            <p>● 系統假單填寫限制區間為 08:30 ~ 17:30</p>
            <p>● 公式：(上班時間 + 假單時間) 需滿 8 小時</p>
        </div>
    </div>

    <script>
        function toggleDarkMode() {
            const html = document.documentElement;
            const icon = document.getElementById('theme-icon');
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                icon.innerText = '🌙';
            } else {
                html.classList.add('dark');
                icon.innerText = '☀️';
            }
        }

        function calculate() {
            const signInInput = document.getElementById('signIn').value;
            const leaveHours = parseFloat(document.getElementById('leaveHours').value);
            const resultBox = document.getElementById('resultBox');
            
            if (!signInInput) return;

            // 1. 基本下班時間計算 (含1小時午休)
            const [h, m] = signInInput.split(':').map(Number);
            let signDate = new Date();
            signDate.setHours(h, m, 0);

            // 應出勤 8 小時 + 1 小時午休 = 9 小時
            let offWorkDate = new Date(signDate.getTime() + 9 * 60 * 60 * 1000);
            
            const offH = offWorkDate.getHours().toString().padStart(2, '0');
            const offM = offWorkDate.getMinutes().toString().padStart(2, '0');
            document.getElementById('offWorkTime').innerText = `${offH}:${offM}`;

            if (leaveHours <= 0) {
                resultBox.classList.add('hidden');
                return;
            }

            resultBox.classList.remove('hidden');

            // 2. 最早簽退時間 = 預計下班時間 - 請假時數
            let exitDate = new Date(offWorkDate.getTime() - leaveHours * 60 * 60 * 1000);
            const exitH = exitDate.getHours().toString().padStart(2, '0');
            const exitM = exitDate.getMinutes().toString().padStart(2, '0');
            document.getElementById('earliestExit').innerText = `${exitH}:${exitM} 即可簽退`;

            // 3. 系統假單建議 (針對下班前請假情境)
            // 邏輯：系統上限 17:30，往前推請假時數
            let sysEnd = new Date();
            sysEnd.setHours(17, 30, 0);
            let sysStart = new Date(sysEnd.getTime() - leaveHours * 60 * 60 * 1000);

            const sSH = sysStart.getHours().toString().padStart(2, '0');
            const sSM = sysStart.getMinutes().toString().padStart(2, '0');
            const sEH = sysEnd.getHours().toString().padStart(2, '0');
            const sEM = sysEnd.getMinutes().toString().padStart(2, '0');
            
            document.getElementById('suggestedLeave').innerText = `${sSH}:${sSM} ~ ${sEH}:${sEM}`;
        }

        // 初始化計算一次
        window.onload = calculate;
    </script>
</body>
</html>
