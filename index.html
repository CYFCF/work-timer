<!DOCTYPE html>
<html lang="zh-TW" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>差假工時計算器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { brand: { light: '#6366F1', dark: '#818CF8' } }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&family=Noto+Sans+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        input[type="time"] { appearance: none; -webkit-appearance: none; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 min-h-screen transition-colors duration-300">

    <!-- Header -->
    <nav class="max-w-xl mx-auto pt-8 px-6 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="bg-brand-light p-2 rounded-lg shadow-lg shadow-indigo-500/30">
                <i class="fa-solid fa-business-time text-white text-xl"></i>
            </div>
            <h1 class="text-xl font-bold tracking-tight">差假計算 <span class="text-brand-light">v4.0</span></h1>
        </div>
        <button id="themeToggle" class="w-10 h-10 rounded-xl bg-white dark:bg-slate-800 shadow-sm border border-slate-200 dark:border-slate-700 flex items-center justify-center transition-all active:scale-95">
            <i class="fa-solid fa-moon dark:hidden text-slate-600"></i>
            <i class="fa-solid fa-sun hidden dark:block text-amber-400"></i>
        </button>
    </nav>

    <main class="max-w-xl mx-auto p-6 space-y-6">
        
        <!-- Step 1: 簽到設定 -->
        <section class="bg-white dark:bg-slate-900 rounded-3xl p-6 shadow-sm border border-slate-200 dark:border-slate-800">
            <div class="flex justify-between items-center mb-6">
                <span class="text-sm font-bold text-slate-400 uppercase tracking-widest">Step 1. 每日簽到</span>
                <span id="earlyBird" class="hidden text-[10px] bg-amber-100 text-amber-700 dark:bg-amber-900/40 dark:text-amber-400 px-2 py-0.5 rounded-full font-bold">08:00 防呆生效</span>
            </div>
            
            <div class="space-y-4">
                <div class="relative">
                    <input type="time" id="startTime" value="08:30" 
                        class="w-full bg-slate-50 dark:bg-slate-800 border-2 border-transparent focus:border-brand-light rounded-2xl p-4 text-4xl mono font-bold outline-none transition-all">
                    <span class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-300 pointer-events-none">24H</span>
                </div>
                <div class="flex items-center justify-between px-2">
                    <p class="text-sm text-slate-500">正常應簽退時間：</p>
                    <p id="standardOff" class="text-xl mono font-bold text-slate-700 dark:text-slate-300">17:30</p>
                </div>
            </div>
        </section>

        <!-- Step 2: 提早離開需求 -->
        <section class="bg-white dark:bg-slate-900 rounded-3xl p-6 shadow-sm border border-slate-200 dark:border-slate-800">
            <span class="text-sm font-bold text-slate-400 uppercase tracking-widest block mb-6">Step 2. 提早離開模擬</span>
            
            <div class="space-y-6">
                <div class="space-y-2">
                    <label class="text-xs font-bold text-slate-500 ml-1">預計實際離開公司時間 (24H)</label>
                    <input type="time" id="leaveTime" value="16:00"
                        class="w-full bg-slate-50 dark:bg-slate-800 border-2 border-transparent focus:border-brand-light rounded-2xl p-4 text-3xl mono font-bold outline-none transition-all">
                </div>

                <!-- 結果區塊 -->
                <div class="grid grid-cols-1 gap-4">
                    <!-- 系統假單建議 -->
                    <div class="bg-indigo-50 dark:bg-indigo-900/20 rounded-2xl p-5 border border-indigo-100 dark:border-indigo-800">
                        <div class="flex justify-between items-center mb-4">
                            <h3 class="text-indigo-600 dark:text-indigo-400 font-bold text-sm">系統假單填寫 (30m 單位)</h3>
                            <span id="leaveHours" class="bg-indigo-600 text-white text-xs px-2 py-0.5 rounded font-mono">1.5 hr</span>
                        </div>
                        <div class="flex items-center justify-between text-2xl mono font-bold tracking-tighter">
                            <span id="sysStart">16:00</span>
                            <i class="fa-solid fa-arrow-right text-indigo-300 text-sm"></i>
                            <span id="sysEnd">17:30</span>
                        </div>
                    </div>

                    <!-- 實際簽退要求 -->
                    <div class="bg-emerald-50 dark:bg-emerald-900/20 rounded-2xl p-5 border border-emerald-100 dark:border-emerald-800">
                        <h3 class="text-emerald-600 dark:text-emerald-400 font-bold text-sm mb-4">今日實際簽退建議時間</h3>
                        <div class="flex items-baseline gap-2">
                            <span id="actualCheckOut" class="text-4xl mono font-bold text-emerald-600 tracking-tighter">16:00</span>
                            <span class="text-xs text-emerald-500 font-bold">以後</span>
                        </div>
                        <p class="text-[10px] text-emerald-400 mt-2">※ 此時間簽退可確保 工時 + 假單 ≥ 8.0 小時</p>
                    </div>
                </div>
            </div>
        </section>

        <!-- Rules -->
        <footer class="px-6 space-y-2">
            <div class="flex items-center gap-2 text-slate-400 text-[10px] font-bold uppercase tracking-widest">
                <i class="fa-solid fa-circle-info"></i>
                <span>計算規則</span>
            </div>
            <ul class="text-[11px] text-slate-400 space-y-1 ml-5 list-disc">
                <li>08:00 前簽到以 08:00 起算，最晚簽退 18:00。</li>
                <li>系統假單僅限 08:30 - 17:30 區間。</li>
                <li>午休 12:30 - 13:30 不計工時。</li>
            </ul>
        </footer>
    </main>

    <script>
        const startTimeInput = document.getElementById('startTime');
        const leaveTimeInput = document.getElementById('leaveTime');
        const earlyBird = document.getElementById('earlyBird');

        function toMin(str) {
            const [h, m] = str.split(':').map(Number);
            return h * 60 + m;
        }

        function toStr(min) {
            const m = Math.max(0, min);
            return `${Math.floor(m / 60).toString().padStart(2, '0')}:${(m % 60).toString().padStart(2, '0')}`;
        }

        function update() {
            let start = toMin(startTimeInput.value);
            const limitStart = toMin("08:00");
            const limitEnd = toMin("18:00");
            const sysLimitEnd = toMin("17:30");

            // 防呆：08:00 限制
            if (start < limitStart) {
                start = limitStart;
                earlyBird.classList.remove('hidden');
            } else {
                earlyBird.classList.add('hidden');
            }

            // 應下班時間 (8h + 1h 休息)
            let stdOff = start + 540; 
            if (stdOff > limitEnd) stdOff = limitEnd;
            document.getElementById('standardOff').textContent = toStr(stdOff);

            // 請假計算
            const leaveAct = toMin(leaveTimeInput.value);
            let gap = stdOff - leaveAct;
            
            // 30分鐘單位進位 (無條件進位確保工時充足)
            let roundedGap = Math.ceil(gap / 30) * 30;
            if (roundedGap < 0) roundedGap = 0;

            // 假單區間：從 17:30 往回推
            const sysStart = sysLimitEnd - roundedGap;
            
            document.getElementById('sysStart').textContent = toStr(sysStart);
            document.getElementById('sysEnd').textContent = "17:30";
            document.getElementById('leaveHours').textContent = `${(roundedGap / 60).toFixed(1)} hr`;

            // 實際簽退要求：應下班時間 - 進位後的請假分鐘
            // 這邊是為了告訴使用者，因為假單請了 roundedGap，你最快幾點可以走
            const checkOutReq = stdOff - roundedGap;
            document.getElementById('actualCheckOut').textContent = toStr(checkOutReq);
        }

        document.getElementById('themeToggle').addEventListener('click', () => document.documentElement.classList.toggle('dark'));
        [startTimeInput, leaveTimeInput].forEach(el => el.addEventListener('input', update));
        
        update();
    </script>
</body>
</html>
