<!DOCTYPE html>
<html lang="zh-TW" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>差假計算器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { brand: { light: '#4F46E5', dark: '#818CF8' } }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&family=Noto+Sans+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; touch-action: manipulation; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .wheel-container { cursor: ns-resize; user-select: none; transition: transform 0.1s; }
        .wheel-container:active { transform: scale(0.95); opacity: 0.7; }
        /* 隱藏預設捲動條 */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 min-h-screen">

    <main class="max-w-md mx-auto p-8 space-y-12">
        
        <header class="flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-tight">差假計算器</h1>
            <button id="themeToggle" class="w-10 h-10 rounded-full bg-white dark:bg-slate-800 shadow-sm flex items-center justify-center text-slate-400">
                <i class="fa-solid fa-circle-half-stroke"></i>
            </button>
        </header>

        <!-- 簽到時間滾輪 -->
        <section class="space-y-4">
            <div class="flex justify-between items-end">
                <label class="text-xs font-bold text-slate-400 tracking-widest uppercase">01 簽到時間</label>
                <span id="earlyBird" class="hidden text-[10px] text-amber-500 font-bold">以 08:00 計算</span>
            </div>
            <div class="flex items-center text-7xl mono font-bold gap-2">
                <div class="wheel-container" id="startH">08</div>
                <div class="text-slate-200 dark:text-slate-800">:</div>
                <div class="wheel-container" id="startM">30</div>
            </div>
            <div class="h-px bg-slate-200 dark:bg-slate-800 w-full"></div>
            <div class="flex justify-between text-[11px] text-slate-400 font-medium">
                <span>應簽退基準</span>
                <span id="standardOff" class="mono font-bold text-slate-600 dark:text-slate-400">17:30</span>
            </div>
        </section>

        <!-- 離開時間滾輪 -->
        <section class="space-y-4">
            <label class="text-xs font-bold text-slate-400 tracking-widest uppercase">02 預計離開</label>
            <div class="flex items-center text-7xl mono font-bold gap-2 text-brand-light">
                <div class="wheel-container" id="leaveH">16</div>
                <div class="opacity-20">:</div>
                <div class="wheel-container" id="leaveM">00</div>
            </div>
            <div class="h-px bg-slate-200 dark:bg-slate-800 w-full"></div>
        </section>

        <!-- 結果顯示區 -->
        <section class="space-y-6 pt-4">
            <div class="bg-white dark:bg-slate-900 border border-slate-100 dark:border-slate-800 rounded-3xl p-6 shadow-sm">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-4">系統假單建議區間</p>
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <span id="sysStart" class="text-2xl mono font-bold">16:30</span>
                        <span class="text-slate-300">→</span>
                        <span id="sysEnd" class="text-2xl mono font-bold">17:30</span>
                    </div>
                    <div class="bg-indigo-50 dark:bg-indigo-900/30 text-indigo-600 dark:text-indigo-400 px-3 py-1 rounded-lg text-sm mono font-bold">
                        <span id="leaveHours">1.0</span>h
                    </div>
                </div>
            </div>

            <div class="bg-slate-900 dark:bg-brand-light text-white rounded-[2rem] p-7 shadow-2xl transition-all">
                <p class="text-[10px] font-bold uppercase tracking-[0.2em] opacity-60 mb-3">當日實際簽退要求時間</p>
                <div class="flex items-baseline gap-2">
                    <span id="actualCheckOut" class="text-5xl mono font-bold tracking-tighter">16:30</span>
                    <span class="text-sm font-bold opacity-80 uppercase">Over</span>
                </div>
            </div>
        </section>

        <p class="text-center text-[10px] text-slate-300 uppercase tracking-widest">
            Slide Up/Down to Adjust
        </p>

    </main>

    <script>
        // 時間數據狀態
        const state = {
            startH: 8, startM: 30,
            leaveH: 16, leaveM: 0
        };

        // 初始化滾輪功能
        function initWheel(id, type, min, max, step = 1) {
            const el = document.getElementById(id);
            let startY = 0;

            const updateValue = (delta) => {
                if (delta > 0) state[id] = (state[id] - step + (max + 1)) % (max + 1);
                else state[id] = (state[id] + step) % (max + 1);
                
                // 分鐘強制度數 (0-59)
                if (type === 'M' && state[id] < 0) state[id] = 59;
                
                el.textContent = state[id].toString().padStart(2, '0');
                calculate();
            };

            // 滑鼠滾輪
            el.addEventListener('wheel', (e) => {
                e.preventDefault();
                updateValue(e.deltaY);
            }, { passive: false });

            // 觸控滑動
            el.addEventListener('touchstart', (e) => { startY = e.touches[0].clientY; }, { passive: true });
            el.addEventListener('touchmove', (e) => {
                const currentY = e.touches[0].clientY;
                const diff = startY - currentY;
                if (Math.abs(diff) > 20) {
                    updateValue(diff);
                    startY = currentY;
                }
            }, { passive: true });

            // 點擊微調
            el.addEventListener('click', () => updateValue(-1));
        }

        function calculate() {
            let sH = state.startH;
            let sM = state.startM;
            let sMinTotal = sH * 60 + sM;

            const MIN_S = 480;  // 08:00
            const MAX_E = 1080; // 18:00
            const SYS_E = 1050; // 17:30
            const birdHint = document.getElementById('earlyBird');

            // 08:00 防呆
            let effectiveStart = sMinTotal;
            if (sMinTotal < MIN_S) {
                effectiveStart = MIN_S;
                birdHint.classList.remove('hidden');
            } else {
                birdHint.classList.add('hidden');
            }

            // 基準下班
            let stdOff = effectiveStart + 540;
            if (stdOff > MAX_E) stdOff = MAX_E;
            document.getElementById('standardOff').textContent = mToT(stdOff);

            // 離開時間
            const lMinTotal = state.leaveH * 60 + state.leaveM;
            let gap = stdOff - lMinTotal;
            
            // 30分鐘單位進位
            let roundedGap = Math.ceil(gap / 30) * 30;
            if (roundedGap < 0) roundedGap = 0;

            const sysS = SYS_E - roundedGap;
            const finalCheckOut = stdOff - roundedGap;

            document.getElementById('sysStart').textContent = mToT(sysS);
            document.getElementById('sysEnd').textContent = "17:30";
            document.getElementById('leaveHours').textContent = (roundedGap / 60).toFixed(1);
            document.getElementById('actualCheckOut').textContent = mToT(finalCheckOut);
        }

        function mToT(min) {
            const m = Math.max(0, min);
            const hh = Math.floor(m / 60).toString().padStart(2, '0');
            const mm = (m % 60).toString().padStart(2, '0');
            return `${hh}:${mm}`;
        }

        // 綁定所有滾輪
        initWheel('startH', 'H', 0, 23);
        initWheel('startM', 'M', 0, 59);
        initWheel('leaveH', 'H', 0, 23);
        initWheel('leaveM', 'M', 0, 59);

        document.getElementById('themeToggle').addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
        });

        calculate();
    </script>
</body>
</html>
