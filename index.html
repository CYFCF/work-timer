<!DOCTYPE html>
<html lang="zh-TW" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>差假計算器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { brand: { light: '#4F46E5', dark: '#818CF8' } } } } }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&family=Noto+Sans+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; -webkit-tap-highlight-color: transparent; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .wheel-active { cursor: ns-resize; transition: all 0.2s; }
        .wheel-active:active { opacity: 0.5; transform: scale(0.9); }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 min-h-screen transition-colors">

    <main class="max-w-md mx-auto p-8 space-y-10">
        
        <header class="flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-tight italic">差假計算器</h1>
            <button id="themeToggle" class="text-slate-400 hover:text-brand-light transition-colors">
                <i class="fa-solid fa-moon dark:hidden"></i>
                <i class="fa-solid fa-sun hidden dark:block"></i>
            </button>
        </header>

        <!-- 第一組：簽到時間 -->
        <section class="space-y-4 group">
            <div class="flex justify-between items-center">
                <label class="text-xs font-bold text-slate-400 uppercase tracking-widest">01 簽到時間</label>
                <span id="earlyBird" class="hidden text-[10px] text-amber-500 font-bold border border-amber-500/20 px-2 py-0.5 rounded">以 08:00 計</span>
            </div>
            
            <div class="flex items-center gap-2">
                <div class="flex items-center text-7xl mono font-bold bg-white dark:bg-slate-900 rounded-3xl p-4 shadow-sm border border-slate-100 dark:border-slate-800">
                    <div id="startH" class="wheel-active w-[1.2em] text-center" data-type="H" data-id="start">08</div>
                    <span class="text-slate-200 dark:text-slate-800 mx-1">:</span>
                    <div id="startM" class="wheel-active w-[1.2em] text-center" data-type="M" data-id="start">30</div>
                </div>
                <button onclick="manualInput('start')" class="p-4 text-slate-300 hover:text-brand-light"><i class="fa-solid fa-keyboard"></i></button>
            </div>
            <div class="flex justify-between text-xs text-slate-400 px-2">
                <span>正常應下班時間</span>
                <span id="standardOff" class="mono font-bold text-slate-600 dark:text-slate-400">17:30</span>
            </div>
        </section>

        <!-- 第二組：預計離開 -->
        <section class="space-y-4 group">
            <label class="text-xs font-bold text-slate-400 uppercase tracking-widest block">02 預計離開時間</label>
            <div class="flex items-center gap-2">
                <div class="flex items-center text-7xl mono font-bold bg-white dark:bg-slate-900 rounded-3xl p-4 shadow-sm border border-slate-100 dark:border-slate-800 text-brand-light">
                    <div id="leaveH" class="wheel-active w-[1.2em] text-center" data-type="H" data-id="leave">16</div>
                    <span class="opacity-20 mx-1">:</span>
                    <div id="leaveM" class="wheel-active w-[1.2em] text-center" data-type="M" data-id="leave">00</div>
                </div>
                <button onclick="manualInput('leave')" class="p-4 text-slate-300 hover:text-brand-light"><i class="fa-solid fa-keyboard"></i></button>
            </div>
        </section>

        <!-- 結果區 -->
        <section class="space-y-4">
            <div class="bg-indigo-50 dark:bg-indigo-900/20 rounded-3xl p-6 border border-indigo-100 dark:border-indigo-800">
                <div class="flex justify-between text-[10px] font-bold text-indigo-400 uppercase tracking-widest mb-4">
                    <span>系統假單區間</span>
                    <span>單位 30m</span>
                </div>
                <div class="flex items-center justify-between">
                    <span id="sysRange" class="text-2xl mono font-bold">16:30 - 17:30</span>
                    <span class="bg-indigo-600 text-white px-3 py-1 rounded-lg text-xs mono font-bold"><span id="leaveHours">1.0</span>h</span>
                </div>
            </div>

            <div class="bg-slate-900 dark:bg-brand-light text-white rounded-[2.5rem] p-8 shadow-2xl">
                <p class="text-[10px] font-bold uppercase tracking-[0.3em] opacity-50 mb-4 text-center">實際簽退要求時間</p>
                <p id="actualCheckOut" class="text-6xl mono font-bold tracking-tighter text-center">16:30</p>
            </div>
        </section>

    </main>

    <!-- 彈出輸入層 -->
    <div id="inputModal" class="fixed inset-0 bg-slate-900/90 backdrop-blur-sm z-50 hidden items-center justify-center p-6">
        <div class="bg-white dark:bg-slate-800 w-full max-w-xs rounded-3xl p-8 shadow-2xl space-y-6">
            <h3 id="modalTitle" class="text-center font-bold text-slate-400 uppercase tracking-widest text-xs">輸入時間</h3>
            <div class="flex justify-center">
                <input type="text" id="modalValue" maxlength="4" placeholder="0830"
                    class="w-full text-center text-6xl mono font-bold bg-transparent outline-none border-b-4 border-brand-light pb-2">
            </div>
            <div class="flex gap-4">
                <button onclick="closeModal()" class="flex-1 py-4 text-slate-400 font-bold">取消</button>
                <button onclick="saveModal()" class="flex-1 py-4 bg-brand-light text-white rounded-2xl font-bold shadow-lg shadow-indigo-500/40">確認</button>
            </div>
        </div>
    </div>

    <script>
        const state = { startH: 8, startM: 30, leaveH: 16, leaveM: 0 };
        let activeTarget = ''; 

        function updateUI() {
            document.getElementById('startH').textContent = state.startH.toString().padStart(2, '0');
            document.getElementById('startM').textContent = state.startM.toString().padStart(2, '0');
            document.getElementById('leaveH').textContent = state.leaveH.toString().padStart(2, '0');
            document.getElementById('leaveM').textContent = state.leaveM.toString().padStart(2, '0');
            calculate();
        }

        // 滾輪邏輯
        document.querySelectorAll('.wheel-active').forEach(el => {
            let startY = 0;
            const type = el.dataset.type;
            const key = el.id;

            const handleUpdate = (delta) => {
                const max = (type === 'H') ? 23 : 59;
                if (delta > 0) state[key] = (state[key] - 1 + (max + 1)) % (max + 1);
                else state[key] = (state[key] + 1) % (max + 1);
                updateUI();
            };

            el.addEventListener('wheel', (e) => { e.preventDefault(); handleUpdate(e.deltaY); }, { passive: false });
            el.addEventListener('touchstart', (e) => { startY = e.touches[0].clientY; }, { passive: true });
            el.addEventListener('touchmove', (e) => {
                const diff = startY - e.touches[0].clientY;
                if (Math.abs(diff) > 25) { handleUpdate(diff); startY = e.touches[0].clientY; }
            }, { passive: true });
            el.addEventListener('click', () => handleUpdate(-1));
        });

        // 鍵盤輸入邏輯
        function manualInput(target) {
            activeTarget = target;
            document.getElementById('modalTitle').textContent = target === 'start' ? '設定簽到時間' : '設定離開時間';
            document.getElementById('modalValue').value = '';
            document.getElementById('inputModal').classList.remove('hidden');
            document.getElementById('inputModal').classList.add('flex');
            document.getElementById('modalValue').focus();
        }

        function closeModal() { document.getElementById('inputModal').classList.replace('flex', 'hidden'); }

        function saveModal() {
            const val = document.getElementById('modalValue').value.padStart(4, '0');
            const h = parseInt(val.slice(0, 2));
            const m = parseInt(val.slice(2, 4));
            if (h >= 0 && h <= 23 && m >= 0 && m <= 59) {
                state[activeTarget + 'H'] = h;
                state[activeTarget + 'M'] = m;
                updateUI();
                closeModal();
            } else {
                alert('時間格式錯誤（請輸入如 0830）');
            }
        }

        function calculate() {
            const startTotal = Math.max(480, state.startH * 60 + state.startM);
            document.getElementById('earlyBird').classList.toggle('hidden', (state.startH * 60 + state.startM) >= 480);
            
            let stdOff = Math.min(1080, startTotal + 540);
            document.getElementById('standardOff').textContent = mToT(stdOff);

            const leaveTotal = state.leaveH * 60 + state.leaveM;
            let gap = Math.max(0, Math.ceil((stdOff - leaveTotal) / 30) * 30);
            
            document.getElementById('sysRange').textContent = `${mToT(1050 - gap)} - 17:30`;
            document.getElementById('leaveHours').textContent = (gap / 60).toFixed(1);
            document.getElementById('actualCheckOut').textContent = mToT(stdOff - gap);
        }

        function mToT(m) { return `${Math.floor(m/60).toString().padStart(2,'0')}:${(m%60).toString().padStart(2,'0')}`; }

        document.getElementById('themeToggle').addEventListener('click', () => document.documentElement.classList.toggle('dark'));
        updateUI();
    </script>
</body>
</html>
