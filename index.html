<!DOCTYPE html>
<html lang="zh-TW" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>差假計算器</title>
    
    <!-- --- 手機 App 圖示支援指令 --- -->
    <!-- Android / Chrome 支援 -->
    <link rel="icon" type="image/png" href="icon.png">
    <!-- iOS 支援 (加到主畫面時的圖示) -->
    <link rel="apple-touch-icon" href="icon.png">
    <!-- Web App Manifest (可選，用於進階 PWA 設定) -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="差假計算器">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = { 
            darkMode: 'class', 
            theme: { 
                extend: { 
                    colors: { 
                        jp: { red: '#FF4D4D', blue: '#3399FF', yellow: '#FFCC00', bg: '#FDFCF8' }
                    } 
                } 
            } 
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;900&family=Noto+Sans+TC:wght@500;900&display=swap');
        
        body { 
            font-family: 'M PLUS Rounded 1c', 'Noto Sans TC', sans-serif; 
            margin: 0; padding: 0; min-height: 100vh; background-color: #FDFCF8;
            /* 背景紋理設計 */
            background-image: radial-gradient(#E5E7EB 1px, transparent 1px);
            background-size: 30px 30px; background-attachment: fixed;
        }

        .jp-pop-card { 
            background: rgba(255, 255, 255, 0.98); border: 4px solid #1A1A1A; 
            box-shadow: 8px 8px 0px #1A1A1A; transition: all 0.1s; position: relative;
        }
        .jp-pop-card:active { transform: translate(4px, 4px); box-shadow: 0px 0px 0px #1A1A1A; }
        .jp-pop-btn { background: white; border: 3px solid #1A1A1A; box-shadow: 4px 4px 0px #1A1A1A; }
        
        .wheel-outer { position: relative; height: 150px; overflow: hidden; background: #f9f9f9; border-radius: 1rem; border: 2px solid #eee; }
        .wheel-container { height: 100%; overflow-y: scroll; scroll-snap-type: y mandatory; -ms-overflow-style: none; scrollbar-width: none; }
        .wheel-container::-webkit-scrollbar { display: none; }
        .wheel-item { height: 50px; line-height: 50px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; opacity: 0.2; scroll-snap-align: center; }
        .wheel-item.active { opacity: 1; font-weight: 900; color: #3399FF; font-size: 2.2rem; }
        .wheel-mask { position: absolute; height: 50px; width: 100%; border-top: 3px solid #1A1A1A; border-bottom: 3px solid #1A1A1A; pointer-events: none; top: 50px; z-index: 5; background: rgba(51, 153, 255, 0.05); }

        .jp-label { position: absolute; top: -12px; left: 15px; background: #1A1A1A; color: white; padding: 2px 10px; font-size: 10px; font-weight: 900; border-radius: 4px; z-index: 10; }
        .app-icon { width: 42px; height: 42px; object-fit: contain; }

        @media (max-width: 380px) {
            .sys-time-text { font-size: 1.875rem !important; line-height: 2.25rem !important; }
            .sys-arrow { font-size: 1.25rem !important; }
        }
    </style>
</head>
<body class="dark:bg-slate-900 transition-colors">

    <main class="max-w-md mx-auto min-h-screen p-6 space-y-10">
        <header class="flex justify-between items-center pt-4">
            <div class="flex items-center gap-3">
                <img src="icon.png" alt="icon" class="app-icon">
                <div class="relative">
                    <div class="absolute -left-1 -top-1 w-4 h-4 bg-jp-yellow rounded-full -z-10"></div>
                    <h1 class="text-3xl font-black text-slate-800 dark:text-white tracking-tighter">差假計算器</h1>
                </div>
            </div>
            <button id="themeToggle" class="w-12 h-12 rounded-2xl jp-pop-btn flex items-center justify-center">
                <i class="fa-solid fa-cloud-sun text-jp-yellow text-xl"></i>
            </button>
        </header>

        <div class="grid grid-cols-2 gap-4">
            <div onclick="openPicker('start')" class="jp-pop-card p-4 rounded-2xl cursor-pointer">
                <div class="jp-label">上班 START</div>
                <p class="text-[9px] font-black text-slate-400 mt-2 text-left">簽到時刻</p>
                <p id="displayStart" class="text-3xl sm:text-4xl font-black text-slate-800 leading-none">08:30</p>
            </div>
            <div onclick="openPicker('leave')" class="jp-pop-card p-4 rounded-2xl cursor-pointer">
                <div class="jp-label">下班 END</div>
                <p class="text-[9px] font-black text-slate-400 mt-2 text-left">預計離開</p>
                <p id="displayLeave" class="text-3xl sm:text-4xl font-black text-jp-blue leading-none">16:00</p>
            </div>
        </div>

        <section class="jp-pop-card bg-jp-yellow rounded-[2rem] p-5 border-4 border-slate-900 shadow-[8px_8px_0px_#1A1A1A] space-y-4">
            <div class="flex justify-between items-center text-left">
                <div class="flex flex-col">
                    <span class="text-slate-800 text-[10px] font-black uppercase tracking-widest">系統假單區間</span>
                    <span class="h-1 w-10 bg-slate-800 rounded-full mt-1"></span>
                </div>
                <div class="bg-white border-2 border-slate-800 px-2 py-1 rounded-xl shadow-[3px_3px_0px_#1A1A1A]">
                    <span class="text-slate-800 font-black italic text-xs"><span id="leaveHours" class="text-lg">1.0</span> HR</span>
                </div>
            </div>
            <div class="flex items-center justify-around gap-2 bg-white border-3 border-slate-900 p-3 rounded-2xl shadow-inner">
                <div class="text-center min-w-[70px]">
                    <p class="text-[9px] font-black text-slate-400 mb-1 uppercase">開始時刻</p>
                    <p id="sysStart" class="sys-time-text text-2xl sm:text-4xl font-black text-slate-800 leading-none">16:30</p>
                </div>
                <div class="text-slate-800 text-lg animate-bounce sys-arrow"><i class="fa-solid fa-arrow-right"></i></div>
                <div class="text-center min-w-[70px]">
                    <p class="text-[9px] font-black text-slate-400 mb-1 uppercase">結束時刻</p>
                    <p id="sysEnd" class="sys-time-text text-2xl sm:text-4xl font-black text-slate-800 leading-none">17:30</p>
                </div>
            </div>
        </section>

        <section class="jp-pop-card bg-jp-blue rounded-[2rem] p-6 text-center border-4 border-slate-900 shadow-[10px_10px_0px_#1A1A1A]">
            <p class="text-[10px] font-black text-white/90 uppercase tracking-[0.4em] mb-3">最速打卡可能時間</p>
            <p id="actualCheckOut" class="text-5xl sm:text-7xl font-black text-white tracking-tighter drop-shadow-[4px_4px_0px_rgba(0,0,0,0.2)] leading-none">16:30</p>
            <div class="mt-4 inline-flex items-center gap-2 bg-jp-yellow text-slate-900 px-4 py-2 rounded-full text-[10px] font-black border-2 border-slate-900 shadow-[3px_3px_0px_#1A1A1A]">
                <i class="fa-solid fa-circle-check"></i> 以後、簽退OK！
            </div>
        </section>

        <section class="jp-pop-card bg-white rounded-2xl p-4 border-4 border-slate-800 shadow-[6px_6px_0px_#1A1A1A] flex justify-between items-center">
            <div class="flex flex-col">
                <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest">STANDARD OFF</span>
                <span class="text-base font-black text-slate-800 leading-tight">基準下班時間</span>
            </div>
            <div class="text-right">
                <p id="standardOff" class="text-2xl sm:text-3xl font-black text-slate-800 mono tracking-tighter">17:30</p>
                <p class="text-[8px] font-bold text-slate-400 italic">※ 無請假狀態</p>
            </div>
        </section>
    </main>

    <!-- 彈窗內容 -->
    <div id="pickerModal" class="fixed inset-0 z-50 hidden bg-slate-900/60 backdrop-blur-md items-end sm:items-center justify-center p-6">
        <div class="bg-white dark:bg-slate-900 w-full sm:max-w-sm rounded-[2.5rem] p-6 border-4 border-slate-800 shadow-[10px_10px_0px_#1A1A1A] overflow-hidden">
            <div class="flex justify-between items-center mb-6">
                <h3 class="font-black text-slate-800 dark:text-white tracking-widest text-base">時間設定</h3>
                <div class="flex bg-slate-100 dark:bg-slate-800 rounded-full p-1 border-2 border-slate-800">
                    <button onclick="toggleMode('key')" id="btnKey" class="px-4 py-2 rounded-full text-[10px] font-black bg-jp-blue text-white shadow-[2px_2px_0px_#1A1A1A]">輸入</button>
                    <button onclick="toggleMode('wheel')" id="btnWheel" class="px-4 py-2 rounded-full text-[10px] font-black text-slate-400 transition-all">滾輪</button>
                </div>
            </div>
            <div id="modeKey" class="flex flex-col items-center py-4">
                <input type="tel" id="manualValue" maxlength="4" placeholder="0830"
                    class="w-full text-center text-6xl font-black bg-transparent border-b-8 border-jp-blue outline-none pb-2 text-slate-800 dark:text-white placeholder:opacity-20">
            </div>
            <div id="modeWheel" class="hidden flex justify-center items-center gap-4 py-4">
                <div class="wheel-outer w-20">
                    <div class="wheel-mask"></div>
                    <div class="wheel-container" id="wheelH"></div>
                </div>
                <div class="text-3xl font-black text-slate-800 dark:text-white">:</div>
                <div class="wheel-outer w-20">
                    <div class="wheel-mask"></div>
                    <div class="wheel-container" id="wheelM"></div>
                </div>
            </div>
            <div class="flex gap-3 mt-6">
                <button id="cancelBtn" class="flex-1 py-4 text-slate-500 font-black border-2 border-slate-200 rounded-xl hover:bg-slate-50 text-sm">取消</button>
                <button id="confirmBtn" class="flex-1 py-4 bg-jp-red text-white rounded-xl font-black border-2 border-slate-800 shadow-[5px_5px_0px_#1A1A1A] active:translate-y-1 text-lg">確定</button>
            </div>
        </div>
    </div>

    <script>
        let state = { target: 'start', start: {h: 8, m: 30}, leave: {h: 16, m: 0} };
        let currentMode = 'key';

        function createWheels() {
            const hWheel = document.getElementById('wheelH');
            const mWheel = document.getElementById('wheelM');
            const gen = (c, w) => {
                w.innerHTML = '<div style="height: 50px;"></div>';
                for(let i=0; i<c; i++){
                    const d = document.createElement('div');
                    d.className = 'wheel-item'; d.dataset.val = i;
                    d.textContent = i.toString().padStart(2, '0');
                    w.appendChild(d);
                }
                w.innerHTML += '<div style="height: 50px;"></div>';
            };
            gen(24, hWheel); gen(60, mWheel);
            [hWheel, mWheel].forEach(w => {
                w.addEventListener('scroll', () => {
                    const c = w.scrollTop + 75;
                    w.querySelectorAll('.wheel-item').forEach(i => {
                        const d = Math.abs((i.offsetTop + 25) - c);
                        i.classList.toggle('active', d < 25);
                    });
                });
            });
        }

        function openPicker(t) {
            state.target = t;
            document.getElementById('pickerModal').classList.replace('hidden', 'flex');
            const i = document.getElementById('manualValue');
            i.value = '';
            setTimeout(() => {
                document.getElementById('wheelH').scrollTop = state[t].h * 50;
                document.getElementById('wheelM').scrollTop = state[t].m * 50;
                if(currentMode === 'key') i.focus();
            }, 100);
        }

        document.getElementById('manualValue').addEventListener('input', function() {
            if (this.value.length === 4) setTimeout(confirmPicker, 300);
        });

        function toggleMode(m) {
            currentMode = m;
            document.getElementById('modeWheel').classList.toggle('hidden', m === 'key');
            document.getElementById('modeKey').classList.toggle('hidden', m === 'wheel');
            const bk = document.getElementById('btnKey'), bw = document.getElementById('btnWheel');
            if(m === 'key') {
                bk.className = "px-4 py-2 rounded-full text-[10px] font-black bg-jp-blue text-white shadow-[2px_2px_0px_#1A1A1A]";
                bw.className = "px-4 py-2 rounded-full text-[10px] font-black text-slate-400";
                setTimeout(() => document.getElementById('manualValue').focus(), 100);
            } else {
                bw.className = "px-4 py-2 rounded-full text-[10px] font-black bg-jp-blue text-white shadow-[2px_2px_0px_#1A1A1A]";
                bk.className = "px-4 py-2 rounded-full text-[10px] font-black text-slate-400";
            }
        }

        function confirmPicker() {
            let h, m;
            if (currentMode === 'wheel') {
                const ah = document.querySelector('#wheelH .wheel-item.active');
                const am = document.querySelector('#wheelM .wheel-item.active');
                h = ah ? parseInt(ah.dataset.val) : 0; m = am ? parseInt(am.dataset.val) : 0;
            } else {
                let v = document.getElementById('manualValue').value.padStart(4, '0');
                h = parseInt(v.slice(0, 2)); m = parseInt(v.slice(2, 4));
            }
            if (!isNaN(h) && h >= 0 && h <= 23 && !isNaN(m) && m >= 0 && m <= 59) {
                state[state.target] = {h, m};
                updateUI(); closePicker();
            }
        }

        function updateUI() {
            document.getElementById('displayStart').textContent = `${state.start.h.toString().padStart(2,'0')}:${state.start.m.toString().padStart(2,'0')}`;
            document.getElementById('displayLeave').textContent = `${state.leave.h.toString().padStart(2,'0')}:${state.leave.m.toString().padStart(2,'0')}`;
            calculate();
        }

        function calculate() {
            const s = Math.max(480, state.start.h * 60 + state.start.m);
            const std = Math.min(1080, s + 540);
            const l = state.leave.h * 60 + state.leave.m;
            let g = Math.max(0, Math.ceil((std - l) / 30) * 30);
            document.getElementById('actualCheckOut').textContent = mToT(std - g);
            document.getElementById('sysStart').textContent = mToT(1050 - g);
            document.getElementById('leaveHours').textContent = (g / 60).toFixed(1);
            document.getElementById('standardOff').textContent = mToT(std);
        }

        function mToT(m) { return `${Math.floor(m/60).toString().padStart(2,'0')}:${(m%60).toString().padStart(2,'0')}`; }
        function closePicker() { document.getElementById('pickerModal').classList.replace('flex', 'hidden'); document.activeElement.blur(); }
        document.getElementById('themeToggle').addEventListener('click', () => document.documentElement.classList.toggle('dark'));
        document.getElementById('confirmBtn').addEventListener('click', confirmPicker);
        document.getElementById('cancelBtn').addEventListener('click', closePicker);
        createWheels(); updateUI();
    </script>
</body>
</html>
