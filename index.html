<!DOCTYPE html>
<html lang="zh-TW" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>差假計算器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = { 
            darkMode: 'class', 
            theme: { 
                extend: { 
                    colors: { 
                        jp: { red: '#FF4D4D', blue: '#3399FF', yellow: '#FFCC00', bg: '#FDFCF8' }
                    } 
                } 
            } 
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;900&family=Noto+Sans+TC:wght@500;900&display=swap');
        body { 
            font-family: 'M PLUS Rounded 1c', 'Noto Sans TC', sans-serif; 
            margin: 0; padding: 0; min-height: 100vh; background-color: #FDFCF8;
            background-image: radial-gradient(#E5E7EB 1px, transparent 1px);
            background-size: 30px 30px; background-attachment: fixed;
        }
        .jp-pop-card { 
            background: rgba(255, 255, 255, 0.98); border: 4px solid #1A1A1A; 
            box-shadow: 8px 8px 0px #1A1A1A; transition: all 0.1s; position: relative;
        }
        .jp-pop-card:active { transform: translate(4px, 4px); box-shadow: 0px 0px 0px #1A1A1A; }
        .jp-pop-btn { background: white; border: 3px solid #1A1A1A; box-shadow: 4px 4px 0px #1A1A1A; }
        
        /* 滾輪核心樣式 */
        .wheel-outer { position: relative; height: 150px; overflow: hidden; background: #f9f9f9; border-radius: 1rem; border: 2px solid #eee; }
        .wheel-container { height: 100%; overflow-y: scroll; scroll-snap-type: y mandatory; -ms-overflow-style: none; scrollbar-width: none; }
        .wheel-container::-webkit-scrollbar { display: none; }
        .wheel-item { height: 50px; line-height: 50px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; opacity: 0.2; scroll-snap-align: center; }
        .wheel-item.active { opacity: 1; font-weight: 900; color: #3399FF; font-size: 2.2rem; }
        .wheel-mask { position: absolute; height: 50px; width: 100%; border-top: 3px solid #1A1A1A; border-bottom: 3px solid #1A1A1A; pointer-events: none; top: 50px; z-index: 5; background: rgba(51, 153, 255, 0.05); }

        .jp-label { position: absolute; top: -12px; left: 15px; background: #1A1A1A; color: white; padding: 2px 10px; font-size: 10px; font-weight: 900; border-radius: 4px; z-index: 10; }
        .app-icon { width: 42px; height: 42px; object-fit: contain; }
    </style>
</head>
<body class="dark:bg-slate-900 transition-colors">

    <main class="max-w-md mx-auto min-h-screen p-6 space-y-10">
        <header class="flex justify-between items-center pt-4">
            <div class="flex items-center gap-3">
                <img src="icon.png" alt="icon" class="app-icon">
                <div class="relative">
                    <div class="absolute -left-1 -top-1 w-4 h-4 bg-jp-yellow rounded-full -z-10"></div>
                    <h1 class="text-3xl font-black text-slate-800 dark:text-white tracking-tighter">差假計算器</h1>
                </div>
            </div>
            <button id="themeToggle" class="w-12 h-12 rounded-2xl jp-pop-btn flex items-center justify-center">
                <i class="fa-solid fa-cloud-sun text-jp-yellow text-xl"></i>
            </button>
        </header>

        <!-- 設定卡片 -->
        <div class="grid grid-cols-2 gap-6">
            <div onclick="openPicker('start')" class="jp-pop-card p-5 rounded-2xl cursor-pointer">
                <div class="jp-label">上班 START</div>
                <p class="text-[10px] font-black text-slate-400 mt-2 text-left">簽到時刻</p>
                <p id="displayStart" class="text-4xl font-black text-slate-800 leading-none">08:30</p>
            </div>
            <div onclick="openPicker('leave')" class="jp-pop-card p-5 rounded-2xl cursor-pointer">
                <div class="jp-label">下班 END</div>
                <p class="text-[10px] font-black text-slate-400 mt-2 text-left">預計離開</p>
                <p id="displayLeave" class="text-4xl font-black text-jp-blue leading-none">16:00</p>
            </div>
        </div>

        <!-- 假單區間 -->
        <section class="jp-pop-card bg-jp-yellow rounded-[2.5rem] p-7 border-4 border-slate-900 shadow-[10px_10px_0px_#1A1A1A] space-y-6">
            <div class="flex justify-between items-center text-left">
                <div class="flex flex-col">
                    <span class="text-slate-800 text-[11px] font-black uppercase tracking-widest">系統假單區間</span>
                    <span class="h-1 w-12 bg-slate-800 rounded-full mt-1"></span>
                </div>
                <div class="bg-white border-2 border-slate-800 px-3 py-1 rounded-xl shadow-[3px_3px_0px_#1A1A1A]">
                    <span class="text-slate-800 font-black italic"><span id="leaveHours" class="text-2xl">1.0</span> HR</span>
                </div>
            </div>
            <div class="flex items-center gap-4 bg-white border-3 border-slate-900 p-5 rounded-2xl shadow-inner">
                <div class="flex-1 text-center">
                    <p class="text-[10px] font-black text-slate-400 mb-1 uppercase">開始時刻</p>
                    <p id="sysStart" class="text-4xl font-black text-slate-800 leading-none">16:30</p>
                </div>
                <div class="text-slate-800 text-2xl animate-bounce"><i class="fa-solid fa-arrow-right"></i></div>
                <div class="flex-1 text-center">
                    <p class="text-[10px] font-black text-slate-400 mb-1 uppercase">結束時刻</p>
                    <p id="sysEnd" class="text-4xl font-black text-slate-800 leading-none">17:30</p>
                </div>
            </div>
        </section>

        <!-- 簽退建議 -->
        <section class="jp-pop-card bg-jp-blue rounded-[2.5rem] p-8 text-center border-4 border-slate-900 shadow-[12px_12px_0px_#1A1A1A]">
            <p class="text-[11px] font-black text-white/90 uppercase tracking-[0.4em] mb-3">最速打卡可能時間</p>
            <p id="actualCheckOut" class="text-7xl font-black text-white tracking-tighter drop-shadow-[4px_4px_0px_rgba(0,0,0,0.2)] leading-none">16:30</p>
            <div class="mt-6 inline-flex items-center gap-2 bg-jp-yellow text-slate-900 px-6 py-2 rounded-full text-xs font-black border-2 border-slate-900 shadow-[3px_3px_0px_#1A1A1A]">
                <i class="fa-solid fa-circle-check"></i> 以後、簽退OK！
            </div>
        </section>

        <footer class="text-center pb-8">
            <p id="standardOff" class="text-[11px] font-black text-slate-500 bg-white border-2 border-slate-800 inline-block px-6 py-2 rounded-full shadow-[4px_4px_0px_#1A1A1A]">基準下班：17:30</p>
        </footer>
    </main>

    <!-- 彈窗內容 -->
    <div id="pickerModal" class="fixed inset-0 z-50 hidden bg-slate-900/60 backdrop-blur-md items-end sm:items-center justify-center p-6">
        <div class="bg-white dark:bg-slate-900 w-full sm:max-w-sm rounded-[3rem] p-8 border-4 border-slate-800 shadow-[15px_15px_0px_#1A1A1A] overflow-hidden">
            <div class="flex justify-between items-center mb-8">
                <h3 class="font-black text-slate-800 dark:text-white tracking-widest text-lg">時間設定</h3>
                <div class="flex bg-slate-100 dark:bg-slate-800 rounded-full p-1 border-2 border-slate-800">
                    <button onclick="toggleMode('key')" id="btnKey" class="px-6 py-2 rounded-full text-xs font-black bg-jp-blue text-white transition-all shadow-[2px_2px_0px_#1A1A1A]">輸入</button>
                    <button onclick="toggleMode('wheel')" id="btnWheel" class="px-6 py-2 rounded-full text-xs font-black text-slate-400 transition-all">滾輪</button>
                </div>
            </div>

            <!-- 輸入模式 -->
            <div id="modeKey" class="flex flex-col items-center py-6">
                <input type="tel" id="manualValue" maxlength="4" placeholder="0830"
                    class="w-full text-center text-7xl font-black bg-transparent border-b-8 border-jp-blue outline-none pb-2 text-slate-800 dark:text-white placeholder:opacity-20">
                <p class="mt-8 text-[12px] font-black text-slate-400 uppercase tracking-widest">請輸入 4 位數 (自動跳轉)</p>
            </div>

            <!-- 滾輪模式 (分時獨立) -->
            <div id="modeWheel" class="hidden flex justify-center items-center gap-4 py-4">
                <div class="wheel-outer w-24">
                    <div class="wheel-mask"></div>
                    <div class="wheel-container" id="wheelH"></div>
                </div>
                <div class="text-4xl font-black text-slate-800 dark:text-white">:</div>
                <div class="wheel-outer w-24">
                    <div class="wheel-mask"></div>
                    <div class="wheel-container" id="wheelM"></div>
                </div>
            </div>

            <div class="flex gap-4 mt-8">
                <button id="cancelBtn" class="flex-1 py-5 text-slate-500 font-black border-2 border-slate-200 rounded-2xl hover:bg-slate-50 transition-colors">取消</button>
                <button id="confirmBtn" class="flex-1 py-5 bg-jp-red text-white rounded-2xl font-black border-2 border-slate-800 shadow-[5px_5px_0px_#1A1A1A] active:translate-y-1 transition-all text-xl">確定</button>
            </div>
        </div>
    </div>

    <script>
        let state = { target: 'start', start: {h: 8, m: 30}, leave: {h: 16, m: 0} };
        let currentMode = 'key';

        function createWheels() {
            const hWheel = document.getElementById('wheelH');
            const mWheel = document.getElementById('wheelM');
            
            const generateItems = (count, container) => {
                container.innerHTML = '<div style="height: 50px;"></div>'; // Spacer
                for(let i=0; i<count; i++) {
                    const item = document.createElement('div');
                    item.className = 'wheel-item';
                    item.dataset.val = i;
                    item.textContent = i.toString().padStart(2, '0');
                    container.appendChild(item);
                }
                container.innerHTML += '<div style="height: 50px;"></div>'; // Spacer
            };

            generateItems(24, hWheel);
            generateItems(60, mWheel);

            [hWheel, mWheel].forEach(w => {
                w.addEventListener('scroll', () => {
                    const center = w.scrollTop + 75; 
                    w.querySelectorAll('.wheel-item').forEach(item => {
                        const itemCenter = item.offsetTop + 25;
                        const dist = Math.abs(itemCenter - center);
                        item.classList.toggle('active', dist < 25);
                    });
                });
            });
        }

        function openPicker(target) {
            state.target = target;
            document.getElementById('pickerModal').classList.replace('hidden', 'flex');
            const input = document.getElementById('manualValue');
            input.value = '';
            
            const h = state[target].h;
            const m = state[target].m;
            
            setTimeout(() => {
                document.getElementById('wheelH').scrollTop = h * 50;
                document.getElementById('wheelM').scrollTop = m * 50;
                if(currentMode === 'key') input.focus();
            }, 100);
        }

        document.getElementById('manualValue').addEventListener('input', function() {
            if (this.value.length === 4) {
                setTimeout(confirmPicker, 300);
            }
        });

        function toggleMode(mode) {
            currentMode = mode;
            document.getElementById('modeWheel').classList.toggle('hidden', mode === 'key');
            document.getElementById('modeKey').classList.toggle('hidden', mode === 'wheel');
            const btnKey = document.getElementById('btnKey');
            const btnWheel = document.getElementById('btnWheel');
            if(mode === 'key') {
                btnKey.className = "px-6 py-2 rounded-full text-xs font-black bg-jp-blue text-white shadow-[2px_2px_0px_#1A1A1A]";
                btnWheel.className = "px-6 py-2 rounded-full text-xs font-black text-slate-400";
                setTimeout(() => document.getElementById('manualValue').focus(), 100);
            } else {
                btnWheel.className = "px-6 py-2 rounded-full text-xs font-black bg-jp-blue text-white shadow-[2px_2px_0px_#1A1A1A]";
                btnKey.className = "px-6 py-2 rounded-full text-xs font-black text-slate-400";
                document.getElementById('manualValue').blur();
            }
        }

        function confirmPicker() {
            let h, m;
            if (currentMode === 'wheel') {
                const activeH = document.querySelector('#wheelH .wheel-item.active');
                const activeM = document.querySelector('#wheelM .wheel-item.active');
                h = activeH ? parseInt(activeH.dataset.val) : 0;
                m = activeM ? parseInt(activeM.dataset.val) : 0;
            } else {
                let val = document.getElementById('manualValue').value.padStart(4, '0');
                h = parseInt(val.slice(0, 2)); m = parseInt(val.slice(2, 4));
            }
            if (!isNaN(h) && h >= 0 && h <= 23 && !isNaN(m) && m >= 0 && m <= 59) {
                state[state.target] = {h, m};
                updateUI();
                closePicker();
            }
        }

        function updateUI() {
            document.getElementById('displayStart').textContent = `${state.start.h.toString().padStart(2,'0')}:${state.start.m.toString().padStart(2,'0')}`;
            document.getElementById('displayLeave').textContent = `${state.leave.h.toString().padStart(2,'0')}:${state.leave.m.toString().padStart(2,'0')}`;
            calculate();
        }

        function calculate() {
            const sT = Math.max(480, state.start.h * 60 + state.start.m);
            const stdOff = Math.min(1080, sT + 540);
            const lT = state.leave.h * 60 + state.leave.m;
            let gap = Math.max(0, Math.ceil((stdOff - lT) / 30) * 30);
            document.getElementById('actualCheckOut').textContent = mToT(stdOff - gap);
            document.getElementById('sysStart').textContent = mToT(1050 - gap);
            document.getElementById('leaveHours').textContent = (gap / 60).toFixed(1);
            document.getElementById('standardOff').textContent = `基準下班：${mToT(stdOff)} (無請假)`;
        }

        function mToT(m) { return `${Math.floor(m/60).toString().padStart(2,'0')}:${(m%60).toString().padStart(2,'0')}`; }
        function closePicker() { document.getElementById('pickerModal').classList.replace('flex', 'hidden'); document.activeElement.blur(); }

        document.getElementById('themeToggle').addEventListener('click', () => document.documentElement.classList.toggle('dark'));
        document.getElementById('confirmBtn').addEventListener('click', confirmPicker);
        document.getElementById('cancelBtn').addEventListener('click', closePicker);

        createWheels();
        updateUI();
    </script>
</body>
</html>
