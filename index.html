<!DOCTYPE html>
<html lang="zh-TW" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>24H 差假計算器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { brand: { light: '#6366F1', dark: '#818CF8' } }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&family=Noto+Sans+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; -webkit-font-smoothing: antialiased; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        /* 隱藏部分瀏覽器可能出現的上下箭頭，保持介面極簡 */
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 min-h-screen transition-colors duration-300">

    <nav class="max-w-md mx-auto pt-8 px-6 flex justify-between items-center">
        <h1 class="text-xl font-bold tracking-tight flex items-center gap-2">
            <span class="w-2 h-6 bg-brand-light rounded-full"></span>
            24H 差假計算
        </h1>
        <button id="themeToggle" class="text-slate-400 hover:text-brand-light transition-colors">
            <i class="fa-solid fa-circle-half-stroke text-xl"></i>
        </button>
    </nav>

    <main class="max-w-md mx-auto p-6 space-y-6">
        
        <!-- 簽到卡片 -->
        <section class="bg-white dark:bg-slate-900 rounded-3xl p-6 shadow-sm border border-slate-200 dark:border-slate-800">
            <div class="flex justify-between items-center mb-4">
                <label class="text-xs font-bold text-slate-400 uppercase tracking-widest">01. 實際簽到時間</label>
                <div id="earlyBird" class="hidden text-[10px] text-amber-500 font-bold border border-amber-500/30 px-2 py-0.5 rounded">以 08:00 計</div>
            </div>
            <input type="time" id="startTime" value="08:30" step="60"
                class="w-full bg-transparent text-5xl mono font-bold outline-none border-b-2 border-slate-100 dark:border-slate-800 focus:border-brand-light pb-2 transition-all">
            <div class="mt-4 flex justify-between text-sm">
                <span class="text-slate-400">應簽退基準 (不請假)</span>
                <span id="standardOff" class="mono font-bold text-slate-600 dark:text-slate-400">17:30</span>
            </div>
        </section>

        <!-- 離開卡片 -->
        <section class="bg-white dark:bg-slate-900 rounded-3xl p-6 shadow-sm border border-slate-200 dark:border-slate-800">
            <label class="text-xs font-bold text-slate-400 uppercase tracking-widest block mb-4">02. 預計離開時間</label>
            <input type="time" id="leaveTime" value="16:00" step="60"
                class="w-full bg-transparent text-5xl mono font-bold outline-none border-b-2 border-slate-100 dark:border-slate-800 focus:border-brand-light pb-2 transition-all">
            
            <div class="mt-8 space-y-4">
                <!-- 假單結果 -->
                <div class="flex items-center justify-between p-4 bg-slate-50 dark:bg-slate-800/50 rounded-2xl">
                    <div>
                        <p class="text-[10px] font-bold text-slate-400 uppercase">系統假單建議區間</p>
                        <p class="text-lg mono font-bold">
                            <span id="sysStart">16:00</span> - <span id="sysEnd">17:30</span>
                        </p>
                    </div>
                    <div class="text-right">
                        <p class="text-[10px] font-bold text-slate-400 uppercase">總時數</p>
                        <p id="leaveHours" class="text-lg mono font-bold text-indigo-500">1.5</p>
                    </div>
                </div>

                <!-- 簽退要求 -->
                <div class="p-4 bg-brand-light rounded-2xl text-white shadow-lg shadow-indigo-500/20">
                    <p class="text-[10px] font-bold uppercase opacity-80">實際簽退要求時間</p>
                    <div class="flex items-baseline gap-2">
                        <span id="actualCheckOut" class="text-4xl mono font-bold tracking-tighter">16:00</span>
                        <span class="text-xs font-bold">以後</span>
                    </div>
                </div>
            </div>
        </section>

        <p class="text-center text-[10px] text-slate-400 uppercase tracking-[0.2em] font-medium">
            Strict 24H Logic • 30M Step
        </p>
    </main>

    <script>
        const startEl = document.getElementById('startTime');
        const leaveEl = document.getElementById('leaveTime');
        const birdEl = document.getElementById('earlyBird');

        function toM(s) { const [h, m] = s.split(':').map(Number); return h * 60 + m; }
        function toS(m) { 
            const hh = Math.floor(Math.max(0, m) / 60).toString().padStart(2, '0');
            const mm = (Math.max(0, m) % 60).toString().padStart(2, '0');
            return `${hh}:${mm}`;
        }

        function run() {
            let s = toM(startEl.value);
            const minS = 480; // 08:00
            const maxE = 1080; // 18:00
            const sysE = 1050; // 17:30

            // 08:00 防呆
            if (s < minS) { s = minS; birdEl.classList.remove('hidden'); } 
            else { birdEl.classList.add('hidden'); }

            // 基準下班時間
            let std = s + 540; 
            if (std > maxE) std = maxE;
            document.getElementById('standardOff').textContent = toS(std);

            // 假單計算 (30分進位)
            const lAct = toM(leaveEl.value);
            let gap = std - lAct;
            let roundGap = Math.ceil(gap / 30) * 30;
            if (roundGap < 0) roundGap = 0;

            document.getElementById('sysStart').textContent = toS(sysE - roundGap);
            document.getElementById('sysEnd').textContent = "17:30";
            document.getElementById('leaveHours').textContent = (roundGap / 60).toFixed(1);
            document.getElementById('actualCheckOut').textContent = toS(std - roundGap);
        }

        document.getElementById('themeToggle').addEventListener('click', () => document.documentElement.classList.toggle('dark'));
        [startEl, leaveEl].forEach(el => el.addEventListener('input', run));
        run();
    </script>
</body>
</html>
