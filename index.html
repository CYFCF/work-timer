<!DOCTYPE html>
<html lang="zh-TW" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>差假工時計算器 v3.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { brand: { light: '#4F46E5', dark: '#818CF8' } }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s ease; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); }
        .dark .glass { background: rgba(30, 41, 59, 0.7); }
        input[type="time"]::-webkit-calendar-picker-indicator { filter: invert(0.5); }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-slate-100 min-h-screen pb-12">

    <nav class="sticky top-0 z-50 glass border-b border-slate-200 dark:border-slate-700 px-6 py-4 flex justify-between items-center">
        <h1 class="text-xl font-semibold flex items-center gap-2">
            <i class="fa-solid fa-calculator text-brand-light"></i>
            差假邏輯計算器 <span class="text-[10px] bg-indigo-100 text-indigo-600 dark:bg-indigo-900 dark:text-indigo-300 px-2 py-0.5 rounded-full">30min 單位版</span>
        </h1>
        <button id="themeToggle" class="p-2 rounded-full hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors">
            <i class="fa-solid fa-moon dark:hidden"></i>
            <i class="fa-solid fa-sun hidden dark:block text-yellow-400"></i>
        </button>
    </nav>

    <main class="max-w-2xl mx-auto mt-8 px-4">
        <!-- 簽到設定 -->
        <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-xl p-6 mb-6 border border-slate-100 dark:border-slate-700">
            <div class="flex justify-between items-center mb-6">
                <h2 class="font-semibold text-slate-700 dark:text-slate-300 flex items-center gap-2">
                    <i class="fa-solid fa-fingerprint text-indigo-500"></i> 每日簽到 (24h)
                </h2>
                <div id="alertBadge" class="hidden text-[10px] bg-amber-50 text-amber-600 px-2 py-1 rounded border border-amber-100">
                    已套用 08:00 計算限制
                </div>
            </div>
            
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-8 items-center">
                <div class="space-y-2">
                    <label class="text-xs text-slate-400 font-medium uppercase tracking-wider">簽到時間</label>
                    <input type="time" id="startTime" value="08:30" 
                        class="w-full bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-xl p-4 text-2xl font-mono focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                </div>
                <div class="bg-indigo-50 dark:bg-indigo-900/20 p-4 rounded-2xl border border-indigo-100 dark:border-indigo-800">
                    <p class="text-xs text-indigo-400 mb-1 uppercase font-bold">預計下班時間</p>
                    <p id="standardOff" class="text-3xl font-mono font-bold text-indigo-600 dark:text-indigo-400">17:30</p>
                    <p class="text-[10px] text-slate-400 mt-2">※ 已含 1hr 午休，最晚至 18:00</p>
                </div>
            </div>
        </div>

        <!-- 請假模擬 -->
        <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-xl overflow-hidden border border-slate-100 dark:border-slate-700">
            <div class="flex border-b border-slate-100 dark:border-slate-700">
                <button onclick="switchTab('A')" id="tabA" class="flex-1 py-4 font-medium transition-all bg-white dark:bg-slate-800 border-b-2 border-indigo-500 text-indigo-600">
                    情境 A：提早下班
                </button>
                <button onclick="switchTab('B')" id="tabB" class="flex-1 py-4 font-medium transition-all text-slate-400 hover:text-slate-600">
                    情境 B：中間外出
                </button>
            </div>

            <div class="p-6">
                <!-- 情境 A -->
                <div id="contentA" class="space-y-6">
                    <div class="space-y-2">
                        <label class="text-xs text-slate-400 font-medium uppercase">預計離開辦公室時間</label>
                        <input type="time" id="leaveEarlyTime" value="16:00"
                            class="w-full bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-xl p-4 text-2xl font-mono outline-none">
                    </div>
                    
                    <div class="p-5 bg-emerald-50 dark:bg-emerald-900/20 rounded-2xl border border-emerald-100 dark:border-emerald-800">
                        <h3 class="text-xs font-bold text-emerald-600 mb-4 uppercase tracking-widest flex items-center justify-between">
                            系統假單填寫建議
                            <span class="bg-emerald-200 dark:bg-emerald-800 text-[10px] px-2 py-0.5 rounded text-emerald-700 dark:text-emerald-300">單位：30min</span>
                        </h3>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <p class="text-[10px] text-slate-400 mb-1">假單開始</p>
                                <p id="leaveStartA" class="text-xl font-mono font-bold">16:30</p>
                            </div>
                            <div>
                                <p class="text-[10px] text-slate-400 mb-1">假單結束</p>
                                <p id="leaveEndA" class="text-xl font-mono font-bold">17:30</p>
                            </div>
                        </div>
                        <div class="mt-4 pt-4 border-t border-emerald-200 dark:border-emerald-800 flex justify-between items-center">
                            <span class="text-sm font-medium">請假總時數：</span>
                            <span id="leaveHoursA" class="text-2xl font-bold text-emerald-600">1.0</span>
                        </div>
                    </div>
                </div>

                <!-- 情境 B -->
                <div id="contentB" class="hidden space-y-6">
                    <div class="grid grid-cols-2 gap-4">
                        <div class="space-y-2">
                            <label class="text-xs text-slate-400 font-medium uppercase">外出時間</label>
                            <input type="time" id="midStart" value="14:00" class="w-full bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-xl p-3 font-mono">
                        </div>
                        <div class="space-y-2">
                            <label class="text-xs text-slate-400 font-medium uppercase">回程時間</label>
                            <input type="time" id="midEnd" value="15:30" class="w-full bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-xl p-3 font-mono">
                        </div>
                    </div>
                    <div class="p-6 bg-blue-50 dark:bg-blue-900/20 rounded-2xl border border-blue-100 dark:border-blue-800 text-center">
                        <p class="text-xs text-blue-400 mb-2 uppercase font-bold tracking-widest">今日應簽退時間 (24h)</p>
                        <p id="offTimeB" class="text-4xl font-mono font-bold text-blue-600">17:00</p>
                    </div>
                </div>
            </div>
        </div>

        <p class="text-center text-[10px] text-slate-400 mt-8 tracking-widest uppercase">
            System Constraint: 08:30~17:30 | Break: 12:30~13:30
        </p>
    </main>

    <script>
        const startTimeInput = document.getElementById('startTime');
        const leaveEarlyInput = document.getElementById('leaveEarlyTime');
        const midStartInput = document.getElementById('midStart');
        const midEndInput = document.getElementById('midEnd');
        const alertBadge = document.getElementById('alertBadge');

        function timeToMin(timeStr) {
            const [h, m] = timeStr.split(':').map(Number);
            return h * 60 + m;
        }

        function minToTime(min) {
            let m = Math.max(0, min);
            const h = Math.floor(m / 60).toString().padStart(2, '0');
            const mm = (m % 60).toString().padStart(2, '0');
            return `${h}:${mm}`;
        }

        function calculate() {
            let actualStart = timeToMin(startTimeInput.value);
            const minStartLimit = timeToMin("08:00");
            const maxOffLimit = timeToMin("18:00");
            const systemEndLimit = timeToMin("17:30");

            // 1. 早到防呆 (08:00)
            if (actualStart < minStartLimit) {
                actualStart = minStartLimit;
                alertBadge.classList.remove('hidden');
            } else {
                alertBadge.classList.add('hidden');
            }

            // 2. 計算無請假時的應下班時間 (8hr + 1hr)
            let standardOffMin = actualStart + 540; // 9小時
            if (standardOffMin > maxOffLimit) standardOffMin = maxOffLimit;
            document.getElementById('standardOff').textContent = minToTime(standardOffMin);

            // 3. 情境 A：提早下班 (時數須進位至 0.5)
            const leaveTarget = timeToMin(leaveEarlyInput.value);
            let gapMin = standardOffMin - leaveTarget;
            
            // 將差距分鐘數向上取至 30 的倍數 (例如 15分 -> 30分)
            let roundedGapMin = Math.ceil(gapMin / 30) * 30;
            if (roundedGapMin < 0) roundedGapMin = 0;

            const leaveStartMin = systemEndLimit - roundedGapMin;
            
            document.getElementById('leaveEndA').textContent = "17:30";
            document.getElementById('leaveStartA').textContent = minToTime(leaveStartMin);
            document.getElementById('leaveHoursA').textContent = (roundedGapMin / 60).toFixed(1);

            // 4. 情境 B：中間外出 (純顯示應簽退)
            document.getElementById('offTimeB').textContent = minToTime(standardOffMin);
        }

        function switchTab(type) {
            const tabA = document.getElementById('tabA'), tabB = document.getElementById('tabB');
            const contentA = document.getElementById('contentA'), contentB = document.getElementById('contentB');
            if (type === 'A') {
                tabA.className = "flex-1 py-4 font-medium transition-all bg-white dark:bg-slate-800 border-b-2 border-indigo-500 text-indigo-600";
                tabB.className = "flex-1 py-4 font-medium transition-all text-slate-400 hover:text-slate-600";
                contentA.classList.remove('hidden'); contentB.classList.add('hidden');
            } else {
                tabB.className = "flex-1 py-4 font-medium transition-all bg-white dark:bg-slate-800 border-b-2 border-indigo-500 text-indigo-600";
                tabA.className = "flex-1 py-4 font-medium transition-all text-slate-400 hover:text-slate-600";
                contentB.classList.remove('hidden'); contentA.classList.add('hidden');
            }
        }

        document.getElementById('themeToggle').addEventListener('click', () => document.documentElement.classList.toggle('dark'));
        [startTimeInput, leaveEarlyInput, midStartInput, midEndInput].forEach(el => el.addEventListener('input', calculate));
        
        calculate();
    </script>
</body>
</html>
